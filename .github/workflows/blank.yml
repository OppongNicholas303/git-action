name: first-time
on: 
  push:
    branches: 
      - main 
      - master
      - "feature/**"
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Using actions/checkout@v3
        uses: actions/checkout@v4
      - name: Print index.html
        run: cat index.html
          
